<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — AgileMentor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --navy:#0F2645;--blue:#2563EB;--teal:#0EA5E9;--white:#FFFFFF;--offwhite:#F8FAFF;--gray:#E8EFF8;--muted:#64748B;--text:#1E293B; }
    body { font-family:'Inter',sans-serif; background:var(--offwhite); min-height:100vh; display:flex; flex-direction:column; }
    nav { background:var(--white); border-bottom:1px solid var(--gray); display:flex; align-items:center; justify-content:space-between; padding:0 6%; height:64px; box-shadow:0 1px 12px rgba(15,38,69,0.07); }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-logo-icon { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--blue),var(--teal)); display:flex; align-items:center; justify-content:center; }
    .nav-logo-icon svg { width:18px; height:18px; fill:none; stroke:white; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .nav-logo-text { font-size:1.15rem; font-weight:800; color:var(--navy); letter-spacing:-0.5px; }
    .nav-logo-text span { color:var(--blue); }
    .main { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 20px; }
    .card { background:var(--white); border-radius:20px; border:1px solid var(--gray); padding:44px; width:100%; max-width:440px; box-shadow:0 20px 60px rgba(15,38,69,0.08); }
    .card-icon { width:56px; height:56px; border-radius:14px; background:linear-gradient(135deg,var(--blue),var(--teal)); display:flex; align-items:center; justify-content:center; font-size:1.4rem; margin-bottom:20px; }
    .card-title { font-size:1.4rem; font-weight:800; color:var(--navy); margin-bottom:6px; }
    .card-sub { font-size:0.86rem; color:var(--muted); margin-bottom:28px; line-height:1.6; }
    .form-group { margin-bottom:18px; }
    .form-label { display:block; font-size:0.82rem; font-weight:600; color:var(--text); margin-bottom:7px; }
    .form-input { width:100%; padding:11px 14px; border-radius:10px; border:1.5px solid var(--gray); background:var(--offwhite); font-size:0.9rem; font-family:'Inter',sans-serif; color:var(--text); outline:none; transition:border-color 0.2s; }
    .form-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,0.1); background:var(--white); }
    .password-hint { font-size:0.75rem; color:var(--muted); margin-top:5px; }
    .btn { width:100%; padding:13px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--blue),var(--teal)); color:white; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; box-shadow:0 6px 20px rgba(37,99,235,0.3); transition:0.2s; }
    .btn:hover { transform:translateY(-1px); }
    .error-box { background:#FEF2F2; border:1.5px solid #FECACA; border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:0.85rem; color:#DC2626; font-weight:500; }
    .expired-box { background:#FFF7ED; border:1.5px solid #FCD34D; border-radius:10px; padding:14px 16px; font-size:0.85rem; color:#92400E; font-weight:500; text-align:center; }
    .expired-box a { color:var(--blue); font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/"><div class="nav-logo-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><span class="nav-logo-text">Agile<span>Mentor</span></span></a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-icon">🔒</div>
    <div class="card-title">Set New Password</div>
    <div class="card-sub">Choose a strong new password for your AgileMentor account.</div>

    {% if expired %}
    <div class="expired-box">
      ⚠️ This reset link has expired or already been used.<br><br>
      <a href="/forgot-password">Request a new one →</a>
    </div>
    {% else %}
      {% if error %}
      <div class="error-box">⚠️ {{ error }}</div>
      {% endif %}
      <form action="/reset-password" method="post">
        <input type="hidden" name="token" value="{{ token }}"/>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" name="password" placeholder="Create a strong password" required/>
          <div class="password-hint">Min. 6 characters, must start with a capital letter.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" name="confirm_password" placeholder="Repeat your password" required/>
        </div>
        <button class="btn" type="submit">Update Password</button>
      </form>
    {% endif %}
  </div>
</div>
</body>
</html>
