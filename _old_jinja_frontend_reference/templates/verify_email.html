<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Email — AgileMentor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:#F4F7FF; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:white; border-radius:20px; border:1px solid #E2E8F4; padding:44px 40px; width:100%; max-width:440px; box-shadow:0 20px 60px rgba(10,22,40,0.08); }
    .logo { font-family:'Space Grotesk',sans-serif; font-size:1.3rem; font-weight:800; color:#0A1628; text-align:center; margin-bottom:28px; }
    .logo em { color:#2563EB; font-style:normal; }
    .icon { width:64px; height:64px; border-radius:16px; background:linear-gradient(135deg,#2563EB,#0EA5E9); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:1.8rem; }
    h1 { font-family:'Space Grotesk',sans-serif; font-size:1.4rem; font-weight:700; color:#0A1628; text-align:center; margin-bottom:8px; }
    .sub { font-size:0.85rem; color:#64748B; text-align:center; line-height:1.6; margin-bottom:28px; }
    .sub strong { color:#0A1628; }
    .otp-row { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
    .otp-input { width:48px; height:58px; border:2px solid #E2E8F4; border-radius:10px; text-align:center; font-size:1.5rem; font-weight:700; font-family:'Space Grotesk',sans-serif; color:#0A1628; background:#F4F7FF; outline:none; transition:border-color 0.15s; }
    .otp-input:focus { border-color:#2563EB; background:white; }
    .btn { width:100%; padding:13px; border-radius:10px; border:none; background:linear-gradient(135deg,#2563EB,#0EA5E9); color:white; font-size:0.9rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; margin-bottom:14px; }
    .btn:hover { opacity:0.9; }
    .error { background:#FEE2E2; border:1px solid #FECACA; border-radius:8px; padding:10px 14px; font-size:0.82rem; color:#B91C1C; margin-bottom:16px; text-align:center; }
    .success { background:#DCFCE7; border:1px solid #BBF7D0; border-radius:8px; padding:10px 14px; font-size:0.82rem; color:#15803D; margin-bottom:16px; text-align:center; }
    .resend-row { text-align:center; font-size:0.82rem; color:#64748B; }
    .resend-btn { background:none; border:none; color:#2563EB; font-weight:600; cursor:pointer; font-size:0.82rem; font-family:'Inter',sans-serif; }
    .resend-btn:hover { text-decoration:underline; }
    .timer { font-size:0.78rem; color:#94A3B8; text-align:center; margin-bottom:12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Agile<em>Mentor</em></div>
  <div class="icon">✉️</div>
  <h1>Check your email</h1>
  <p class="sub">We sent a 6-digit OTP to <strong>{{ email }}</strong>.<br/>Enter it below to verify your account.</p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}

  <form action="/verify-email" method="post" id="otpForm">
    <input type="hidden" name="user_id" value="{{ user_id }}"/>
    <div class="otp-row">
      <input class="otp-input" type="text" maxlength="1" id="d1" autofocus/>
      <input class="otp-input" type="text" maxlength="1" id="d2"/>
      <input class="otp-input" type="text" maxlength="1" id="d3"/>
      <input class="otp-input" type="text" maxlength="1" id="d4"/>
      <input class="otp-input" type="text" maxlength="1" id="d5"/>
      <input class="otp-input" type="text" maxlength="1" id="d6"/>
    </div>
    <input type="hidden" name="otp_code" id="otpHidden"/>
    <div class="timer" id="timer">OTP expires in <strong id="countdown">05:00</strong></div>
    <button class="btn" type="submit">Verify Email →</button>
  </form>

  <div class="resend-row">
    Didn't receive it?
    <form action="/resend-otp" method="post" style="display:inline;">
      <input type="hidden" name="user_id" value="{{ user_id }}"/>
      <button class="resend-btn" type="submit">Resend OTP</button>
    </form>
  </div>
</div>

<script>
  // Auto-advance OTP inputs
  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', e => {
      const val = e.target.value.replace(/\D/g,'');
      e.target.value = val;
      if (val && i < 5) inputs[i+1].focus();
      updateHidden();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) inputs[i-1].focus();
    });
    inp.addEventListener('paste', e => {
      const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
      if (paste.length === 6) {
        inputs.forEach((inp, j) => inp.value = paste[j] || '');
        updateHidden();
        inputs[5].focus();
      }
      e.preventDefault();
    });
  });

  function updateHidden() {
    document.getElementById('otpHidden').value = Array.from(inputs).map(i=>i.value).join('');
  }

  document.getElementById('otpForm').addEventListener('submit', e => {
    updateHidden();
    const code = document.getElementById('otpHidden').value;
    if (code.length !== 6) { e.preventDefault(); alert('Please enter all 6 digits.'); }
  });

  // Countdown timer (5 mins)
  let secs = 300;
  const cd = document.getElementById('countdown');
  const interval = setInterval(() => {
    secs--;
    const m = String(Math.floor(secs/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    cd.textContent = `${m}:${s}`;
    if (secs <= 0) { clearInterval(interval); cd.textContent = 'Expired'; cd.style.color='#EF4444'; }
  }, 1000);
</script>
</body>
</html>
